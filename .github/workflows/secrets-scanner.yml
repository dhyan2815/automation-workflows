name: Secrets Scanner & Auto-Redaction

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan-and-redact:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            CHANGED_FILES=$(git diff --name-status HEAD~1 HEAD -- '*.json' '*.md' '*.js' '*.ts' '*.py' | grep -E '^[AMD]' | cut -f2)
            echo "files=$CHANGED_FILES" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-status ${{ github.event.pull_request.base.sha }} HEAD -- '*.json' '*.md' '*.js' '*.ts' '*.py' | grep -E '^[AMD]' | cut -f2)
            echo "files=$CHANGED_FILES" >> $GITHUB_OUTPUT
          else
            echo "files=" >> $GITHUB_OUTPUT
          fi

      - name: Scan for secrets and redact
        id: secrets-scan
        run: |
          FILES="${{ steps.changed-files.outputs.files }}"
          
          if [ -z "$FILES" ]; then
            echo "No files to scan"
            echo "secrets_found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Scanning files: $FILES"
          echo "secrets_found=false" >> $GITHUB_OUTPUT

          # Write patterns to a temp file to avoid shell parsing issues
          cat > /tmp/patterns.txt << 'PATTERNS'
          (api[_-]?key|apikey)[^a-zA-Z0-9]{0,3}([a-zA-Z0-9]{20,})
          (client[_-]?id|project[_-]?id|instance[_-]?id)[^a-zA-Z0-9]{0,3}([a-zA-Z0-9_-]{15,})
          (password|passwd|pwd)[^a-zA-Z0-9]{0,3}([^\s]{8,})
          (access[_-]?token|auth[_-]?token|refresh[_-]?token)[^a-zA-Z0-9]{0,3}([a-zA-Z0-9_-]{20,})
          (secret[_-]?key|client[_-]?secret)[^a-zA-Z0-9]{0,3}([a-zA-Z0-9_-]{15,})
          -----BEGIN [A-Z ]+ PRIVATE KEY-----
          Bearer [a-zA-Z0-9_-]{20,}
          PATTERNS

          # Scan each file
          echo "$FILES" | while read -r file; do
            if [ -f "$file" ]; then
              echo "Scanning: $file"
              
              # Check for secrets using grep with patterns from file
              if grep -Eif /tmp/patterns.txt "$file" 2>/dev/null; then
                echo "⚠️ Secrets detected in $file"
                echo "secrets_found=true" >> $GITHUB_OUTPUT
                
                # Replace patterns using sed - handle each type separately
                # API keys
                sed -i -E 's/((api[_-]?key|apikey)[^a-zA-Z0-9]{0,3})([a-zA-Z0-9]{20,})/\1\$API_KEY_PLACEHOLDER/gI' "$file"
                
                # Client/Project IDs
                sed -i -E 's/((client[_-]?id|project[_-]?id|instance[_-]?id)[^a-zA-Z0-9]{0,3})([a-zA-Z0-9_-]{15,})/\1\$CLIENT_ID_PLACEHOLDER/gI' "$file"
                
                # Passwords
                sed -i -E 's/((password|passwd|pwd)[^a-zA-Z0-9]{0,3})([^\s]{8,})/\1\$PASSWORD_PLACEHOLDER/gI' "$file"
                
                # Tokens
                sed -i -E 's/((access[_-]?token|auth[_-]?token|refresh[_-]?token)[^a-zA-Z0-9]{0,3})([a-zA-Z0-9_-]{20,})/\1\$ACCESS_TOKEN_PLACEHOLDER/gI' "$file"
                
                # Secret keys
                sed -i -E 's/((secret[_-]?key|client[_-]?secret)[^a-zA-Z0-9]{0,3})([a-zA-Z0-9_-]{15,})/\1\$SECRET_KEY_PLACEHOLDER/gI' "$file"
                
                # Bearer tokens
                sed -i -E 's/Bearer [a-zA-Z0-9_-]{20,}/Bearer \$API_KEY_PLACEHOLDER/gI' "$file"
                
                # Private keys
                sed -i -E 's/-----BEGIN [A-Z ]+ PRIVATE KEY-----/-----BEGIN PRIVATE KEY PLACEHOLDER-----/g' "$file"
                
                echo "✅ Redacted secrets in $file"
              else
                echo "No secrets found in $file"
              fi
            fi
          done

      - name: Commit redacted changes
        if: steps.secrets-scan.outputs.secrets_found == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git commit -m "chore: Auto-redact sensitive credentials" || echo "No changes to commit"
          git push

      - name: Add commit status check
        if: steps.secrets-scan.outputs.secrets_found == 'true'
        run: |
          echo "✅ Secrets Scanner: Found and redacted sensitive data"
          echo "Files containing credentials have been auto-redacted with placeholders"

      - name: Success status
        if: steps.secrets-scan.outputs.secrets_found == 'false'
        run: |
          echo "✅ Secrets Scanner: No credentials detected - commit is clean"