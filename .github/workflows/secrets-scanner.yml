name: Secrets Scanner & Auto-Redaction

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan-and-redact:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            CHANGED_FILES=$(git diff --name-status HEAD~1 HEAD -- '*.json' '*.md' '*.js' '*.ts' '*.py' | grep -E '^[AMD]' | cut -f2)
            echo "files=$CHANGED_FILES" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-status ${{ github.event.pull_request.base.sha }} HEAD -- '*.json' '*.md' '*.js' '*.ts' '*.py' | grep -E '^[AMD]' | cut -f2)
            echo "files=$CHANGED_FILES" >> $GITHUB_OUTPUT
          else
            echo "files=" >> $GITHUB_OUTPUT
          fi

      - name: Scan for secrets and redact
        id: secrets-scan
        run: |
          FILES="${{ steps.changed-files.outputs.files }}"
          
          if [ -z "$FILES" ]; then
            echo "No files to scan"
            echo "secrets_found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Scanning files: $FILES"
          echo "secrets_found=false" >> $GITHUB_OUTPUT

          # Patterns to detect sensitive data
          # API Keys (generic alphanumeric strings)
          API_KEY_PATTERN='(api[_-]?key|apikey)\s*[:=]\s*['\''"]?([a-zA-Z0-9]{20,})['\''"]?'
          # IDs with similar patterns  
          ID_PATTERN='(client[_-]?id|project[_-]?id|instance[_-]?id)\s*[:=]\s*['\''"]?([a-zA-Z0-9_-]{15,})['\''"]?'
          # Passwords
          PASSWORD_PATTERN='(password|passwd|pwd)\s*[:=]\s*['\''"]?([^\s'\''"]{8,})['\''"]?'
          # Tokens
          TOKEN_PATTERN='(access[_-]?token|auth[_-]?token|refresh[_-]?token)\s*[:=]\s*['\''"]?([a-zA-Z0-9_-]{20,})['\''"]?'
          # Secret keys
          SECRET_PATTERN='(secret[_-]?key|client[_-]?secret)\s*[:=]\s*['\''"]?([a-zA-Z0-9_-]{15,})['\''"]?'
          # Private keys
          PRIVATE_KEY_PATTERN='----BEGIN [A-Z ]+ PRIVATE KEY-----'
          # Bearer tokens
          BEARER_PATTERN='Bearer\s+[a-zA-Z0-9_-]{20,}'

          # Scan each file
          echo "$FILES" | while read -r file; do
            if [ -f "$file" ]; then
              echo "Scanning: $file"
              
              # Check for various secret patterns
              if grep -EiE "$API_KEY_PATTERN|$ID_PATTERN|$PASSWORD_PATTERN|$TOKEN_PATTERN|$SECRET_PATTERN|$PRIVATE_KEY_PATTERN|$BEARER_PATTERN" "$file" 2>/dev/null; then
                echo "⚠️ Secrets detected in $file"
                echo "secrets_found=true" >> $GITHUB_OUTPUT
                
                # Replace API keys with placeholder
                sed -i -E "s/(api[_-]?key|apikey)\s*[:=]\s*['\''"]?([a-zA-Z0-9]{20,})['\''"]?/API_KEY_PLACEHOLDER/gI" "$file"
                
                # Replace IDs with placeholder
                sed -i -E "s/(client[_-]?id|project[_-]?id|instance[_-]?id)\s*[:=]\s*['\''"]?([a-zA-Z0-9_-]{15,})['\''"]?/CLIENT_ID_PLACEHOLDER/gI" "$file"
                
                # Replace passwords with placeholder
                sed -i -E "s/(password|passwd|pwd)\s*[:=]\s*['\''"]?([^\s'\''"]{8,})['\''"]?/PASSWORD_PLACEHOLDER/gI" "$file"
                
                # Replace tokens with placeholder
                sed -i -E "s/(access[_-]?token|auth[_-]?token|refresh[_-]?token)\s*[:=]\s*['\''"]?([a-zA-Z0-9_-]{20,})['\''"]?/ACCESS_TOKEN_PLACEHOLDER/gI" "$file"
                
                # Replace secret keys with placeholder
                sed -i -E "s/(secret[_-]?key|client[_-]?secret)\s*[:=]\s*['\''"]?([a-zA-Z0-9_-]{15,})['\''"]?/SECRET_KEY_PLACEHOLDER/gI" "$file"
                
                # Replace bearer tokens
                sed -i -E "s/Bearer\s+[a-zA-Z0-9_-]{20,}/Bearer \$API_KEY/gI" "$file"
                
                echo "✅ Redacted secrets in $file"
              else
                echo "No secrets found in $file"
              fi
            fi
          done

      - name: Commit redacted changes
        if: steps.secrets-scan.outputs.secrets_found == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git commit -m "chore: Auto-redact sensitive credentials" || echo "No changes to commit"
          git push

      - name: Add commit status check
        if: steps.secrets-scan.outputs.secrets_found == 'true'
        run: |
          echo "✅ Secrets Scanner: Found and redacted sensitive data"
          echo "Files containing credentials have been auto-redacted with placeholders"

      - name: Success status
        if: steps.secrets-scan.outputs.secrets_found == 'false'
        run: |
          echo "✅ Secrets Scanner: No credentials detected - commit is clean"